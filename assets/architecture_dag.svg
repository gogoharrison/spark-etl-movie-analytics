<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace">

  <rect width="900" height="220" fill="#0d1117"/>

  <text x="450" y="30" text-anchor="middle" font-size="13" font-weight="600" fill="#7d8590" letter-spacing="3">SYSTEM ARCHITECTURE</text>

  <!-- Data Source -->
  <rect x="30" y="46" width="150" height="80" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="105" y="70" text-anchor="middle" font-size="11" font-weight="700" fill="#58a6ff">DATA SOURCE</text>
  <text x="105" y="88" text-anchor="middle" font-size="10" fill="#8b949e">GroupLens Research</text>
  <text x="105" y="104" text-anchor="middle" font-size="10" fill="#8b949e">ml-latest.zip</text>
  <text x="105" y="120" text-anchor="middle" font-size="9" fill="#6e7681">~334 MB · 5 CSV files</text>

  <!-- Arrow 1 -->
  <line x1="180" y1="86" x2="218" y2="86" stroke="#30363d" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="199" y="80" text-anchor="middle" font-size="9" fill="#6e7681">HTTP stream</text>

  <!-- Airflow -->
  <rect x="220" y="46" width="200" height="80" rx="8" fill="#161b22" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="320" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#1f6feb">AIRFLOW ORCHESTRATION</text>
  <text x="320" y="86" text-anchor="middle" font-size="10" fill="#8b949e">15-task DAG · weekly schedule</text>
  <text x="320" y="102" text-anchor="middle" font-size="10" fill="#8b949e">download → clean → transform</text>
  <text x="320" y="118" text-anchor="middle" font-size="10" fill="#8b949e">→ load → similarity → audit</text>

  <!-- Parquet note -->
  <rect x="220" y="140" width="200" height="26" rx="5" fill="#161b22" stroke="#e3b341" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="320" y="157" text-anchor="middle" font-size="10" fill="#e3b341">Parquet staging · data/processed/</text>

  <!-- Arrow 2 -->
  <line x1="420" y1="86" x2="458" y2="86" stroke="#30363d" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="439" y="80" text-anchor="middle" font-size="9" fill="#6e7681">JDBC</text>

  <!-- PostgreSQL -->
  <rect x="460" y="46" width="190" height="80" rx="8" fill="#161b22" stroke="#238636" stroke-width="1.5"/>
  <text x="555" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#3fb950">POSTGRESQL 15</text>
  <text x="555" y="86" text-anchor="middle" font-size="10" fill="#8b949e">Star schema · 33.8M rows</text>
  <text x="555" y="102" text-anchor="middle" font-size="10" fill="#8b949e">fact_ratings · dim_movies</text>
  <text x="555" y="118" text-anchor="middle" font-size="10" fill="#8b949e">genre_trends · tag_similarity</text>

  <!-- Arrow 3 -->
  <line x1="650" y1="86" x2="688" y2="86" stroke="#30363d" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="669" y="80" text-anchor="middle" font-size="9" fill="#6e7681">SQL</text>

  <!-- Metabase -->
  <rect x="690" y="46" width="180" height="80" rx="8" fill="#161b22" stroke="#8957e5" stroke-width="1.5"/>
  <text x="780" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#a371f7">METABASE BI LAYER</text>
  <text x="780" y="86" text-anchor="middle" font-size="10" fill="#8b949e">4 dashboards · cached</text>
  <text x="780" y="102" text-anchor="middle" font-size="10" fill="#8b949e">Movie Analytics · Genre</text>
  <text x="780" y="118" text-anchor="middle" font-size="10" fill="#8b949e">Decade · Pipeline Health</text>

  <text x="450" y="202" text-anchor="middle" font-size="10" fill="#6e7681">Built with Python · PySpark 3.5 · Apache Airflow 2.10.5 · PostgreSQL 15 · Docker · Metabase</text>

  <defs>
    <marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#6e7681" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
</svg>
