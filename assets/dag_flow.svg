<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace">

  <rect width="900" height="480" fill="#0d1117"/>

  <text x="450" y="30" text-anchor="middle" font-size="13" font-weight="600" fill="#7d8590" letter-spacing="3">AIRFLOW DAG — movie_analytics_pipeline</text>

  <!-- Row 1: start → ensure_schema → check_remote_updates -->
  <rect x="20" y="52" width="80" height="36" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="60" y="74" text-anchor="middle" font-size="11" font-weight="600" fill="#c9d1d9">start</text>

  <line x1="100" y1="70" x2="126" y2="70" stroke="#30363d" stroke-width="1.2" marker-end="url(#d1)"/>

  <rect x="128" y="52" width="140" height="36" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="198" y="74" text-anchor="middle" font-size="11" font-weight="600" fill="#c9d1d9">ensure_schema</text>

  <line x1="268" y1="70" x2="294" y2="70" stroke="#30363d" stroke-width="1.2" marker-end="url(#d1)"/>

  <!-- BranchPythonOperator -->
  <rect x="296" y="52" width="168" height="36" rx="6" fill="#161b22" stroke="#e3b341" stroke-width="1.5"/>
  <text x="380" y="68" text-anchor="middle" font-size="10" font-weight="700" fill="#e3b341">check_remote_updates</text>
  <text x="380" y="82" text-anchor="middle" font-size="9" fill="#6e7681">BranchPythonOperator</text>

  <!-- Full pipeline branch right -->
  <line x1="464" y1="70" x2="490" y2="70" stroke="#3fb950" stroke-width="1.5" marker-end="url(#dgr)"/>
  <text x="477" y="64" text-anchor="middle" font-size="9" fill="#3fb950">changed</text>

  <!-- Skip branch down -->
  <line x1="380" y1="88" x2="380" y2="126" stroke="#e3b341" stroke-width="1.2" stroke-dasharray="4 2" marker-end="url(#dam)"/>
  <text x="414" y="112" font-size="9" fill="#e3b341">unchanged</text>

  <rect x="296" y="128" width="168" height="34" rx="6" fill="#161b22" stroke="#e3b341" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="380" y="149" text-anchor="middle" font-size="11" font-weight="600" fill="#e3b341">log_skipped_run</text>

  <!-- download → extract → validate → truncate (right of branch) -->
  <rect x="492" y="52" width="96" height="36" rx="6" fill="#161b22" stroke="#1f6feb" stroke-width="1"/>
  <text x="540" y="74" text-anchor="middle" font-size="11" font-weight="600" fill="#58a6ff">download</text>

  <line x1="588" y1="70" x2="606" y2="70" stroke="#30363d" stroke-width="1.2" marker-end="url(#d1)"/>

  <rect x="608" y="52" width="80" height="36" rx="6" fill="#161b22" stroke="#1f6feb" stroke-width="1"/>
  <text x="648" y="74" text-anchor="middle" font-size="11" font-weight="600" fill="#58a6ff">extract</text>

  <line x1="688" y1="70" x2="706" y2="70" stroke="#30363d" stroke-width="1.2" marker-end="url(#d1)"/>

  <rect x="708" y="52" width="80" height="36" rx="6" fill="#161b22" stroke="#1f6feb" stroke-width="1"/>
  <text x="748" y="74" text-anchor="middle" font-size="11" font-weight="600" fill="#58a6ff">validate</text>

  <line x1="788" y1="70" x2="810" y2="70" stroke="#30363d" stroke-width="1.2" marker-end="url(#d1)"/>

  <rect x="812" y="52" width="70" height="36" rx="6" fill="#161b22" stroke="#f78166" stroke-width="1.5"/>
  <text x="847" y="74" text-anchor="middle" font-size="11" font-weight="600" fill="#f78166">truncate</text>

  <!-- truncate down into spark group -->
  <line x1="847" y1="88" x2="847" y2="156" stroke="#30363d" stroke-width="1.2" marker-end="url(#d1)"/>

  <!-- ── spark_jobs TaskGroup ── -->
  <rect x="20" y="158" width="860" height="100" rx="10" fill="#161b22" stroke="#1f6feb" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="36" y="178" font-size="10" font-weight="700" fill="#1f6feb">spark_jobs  TaskGroup</text>

  <rect x="36" y="184" width="104" height="44" rx="6" fill="#0d1117" stroke="#8957e5" stroke-width="1"/>
  <text x="88" y="202" text-anchor="middle" font-size="10" font-weight="600" fill="#a371f7">ingest_data</text>
  <text x="88" y="218" text-anchor="middle" font-size="9" fill="#6e7681">schema check</text>

  <line x1="140" y1="206" x2="158" y2="206" stroke="#30363d" stroke-width="1.2" marker-end="url(#d1)"/>

  <rect x="160" y="184" width="116" height="44" rx="6" fill="#0d1117" stroke="#8957e5" stroke-width="1.5"/>
  <text x="218" y="202" text-anchor="middle" font-size="10" font-weight="600" fill="#a371f7">clean_data</text>
  <text x="218" y="218" text-anchor="middle" font-size="9" fill="#e3b341">→ writes Parquet</text>

  <line x1="276" y1="206" x2="294" y2="206" stroke="#30363d" stroke-width="1.2" marker-end="url(#d1)"/>

  <rect x="296" y="184" width="130" height="44" rx="6" fill="#0d1117" stroke="#8957e5" stroke-width="1.5"/>
  <text x="361" y="202" text-anchor="middle" font-size="10" font-weight="600" fill="#a371f7">transform_data</text>
  <text x="361" y="218" text-anchor="middle" font-size="9" fill="#e3b341">reads + writes Parquet</text>

  <line x1="426" y1="206" x2="444" y2="206" stroke="#30363d" stroke-width="1.2" marker-end="url(#d1)"/>

  <rect x="446" y="184" width="140" height="44" rx="6" fill="#0d1117" stroke="#8957e5" stroke-width="1.5"/>
  <text x="516" y="202" text-anchor="middle" font-size="10" font-weight="600" fill="#a371f7">load_to_postgres</text>
  <text x="516" y="218" text-anchor="middle" font-size="9" fill="#e3b341">reads Parquet · append mode</text>

  <line x1="586" y1="206" x2="604" y2="206" stroke="#30363d" stroke-width="1.2" marker-end="url(#d1)"/>

  <rect x="606" y="184" width="120" height="44" rx="6" fill="#0d1117" stroke="#3fb950" stroke-width="1"/>
  <text x="666" y="202" text-anchor="middle" font-size="10" font-weight="600" fill="#3fb950">run_similarity</text>
  <text x="666" y="218" text-anchor="middle" font-size="9" fill="#6e7681">cosine sim top 500</text>

  <line x1="726" y1="206" x2="744" y2="206" stroke="#30363d" stroke-width="1.2" marker-end="url(#d1)"/>

  <rect x="746" y="184" width="120" height="44" rx="6" fill="#0d1117" stroke="#3fb950" stroke-width="1"/>
  <text x="806" y="202" text-anchor="middle" font-size="10" font-weight="600" fill="#3fb950">data_quality</text>
  <text x="806" y="218" text-anchor="middle" font-size="9" fill="#6e7681">row counts · FK checks</text>

  <!-- Out of spark group -->
  <line x1="806" y1="258" x2="806" y2="284" stroke="#30363d" stroke-width="1.2" marker-end="url(#d1)"/>

  <rect x="746" y="286" width="120" height="34" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="806" y="307" text-anchor="middle" font-size="11" font-weight="600" fill="#3fb950">log_pipeline_run</text>

  <line x1="806" y1="320" x2="806" y2="346" stroke="#30363d" stroke-width="1.2" marker-end="url(#d1)"/>

  <rect x="746" y="348" width="120" height="34" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="806" y="369" text-anchor="middle" font-size="11" font-weight="600" fill="#c9d1d9">cleanup</text>

  <!-- end -->
  <line x1="806" y1="382" x2="806" y2="408" stroke="#30363d" stroke-width="1.2" marker-end="url(#d1)"/>

  <!-- skip branch joins end -->
  <line x1="380" y1="162" x2="380" y2="424" stroke="#e3b341" stroke-width="1" stroke-dasharray="4 2"/>
  <line x1="380" y1="424" x2="776" y2="424" stroke="#e3b341" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#dam)"/>

  <rect x="778" y="410" width="56" height="34" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="806" y="431" text-anchor="middle" font-size="11" font-weight="600" fill="#c9d1d9">end</text>

  <!-- Trigger rule notes -->
  <text x="450" y="458" text-anchor="middle" font-size="10" fill="#6e7681">end: trigger_rule=none_failed_min_one_success · cleanup: trigger_rule=all_done · log_pipeline_run: trigger_rule=all_success</text>

  <defs>
    <marker id="d1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#6e7681" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="dgr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3fb950" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="dam" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#e3b341" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
</svg>
