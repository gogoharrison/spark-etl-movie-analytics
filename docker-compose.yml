services:
  postgres:
    image: postgres:15
    container_name: movie_postgres
    environment:
      POSTGRES_USER: movieuser
      POSTGRES_PASSWORD: movie123
      POSTGRES_DB: moviedb
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U movieuser -d moviedb']
      interval: 10s
      timeout: 5s
      retries: 5

  metabase:
    image: metabase/metabase:latest
    container_name: movie_metabase
    ports:
      - '3000:3000'
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabasedb
      MB_DB_PORT: 5432
      MB_DB_USER: movieuser
      MB_DB_PASS: movie123
      MB_DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy

  airflow-init:
    build: .
    image: movie_airflow_custom:latest
    container_name: movie_airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://movieuser:movie123@postgres/airflowdb
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      RAW_DATA_PATH: /opt/airflow/data/raw
      PIPELINE_VERSION: local
    volumes:
      - ./dags:/opt/airflow/dags
      - ./jobs:/opt/airflow/jobs
      - ./data:/opt/airflow/data
      - ./sql:/opt/airflow/sql
      - airflow_logs:/opt/airflow/logs
    entrypoint: bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Harrison --lastname DE --role Admin --email admin@movieanalytics.com || true"
    restart: on-failure

  airflow-webserver:
    build: .
    image: movie_airflow_custom:latest
    container_name: movie_airflow_webserver
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://movieuser:movie123@postgres/airflowdb
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      RAW_DATA_PATH: /opt/airflow/data/raw
      PIPELINE_VERSION: local
    volumes:
      - ./dags:/opt/airflow/dags
      - ./jobs:/opt/airflow/jobs
      - ./data:/opt/airflow/data
      - ./sql:/opt/airflow/sql
      - airflow_logs:/opt/airflow/logs
    ports:
      - '8080:8080'
    command: webserver
    restart: unless-stopped

  airflow-scheduler:
    build: .
    image: movie_airflow_custom:latest
    container_name: movie_airflow_scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://movieuser:movie123@postgres/airflowdb
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      RAW_DATA_PATH: /opt/airflow/data/raw
      PIPELINE_VERSION: local
    volumes:
      - ./dags:/opt/airflow/dags
      - ./jobs:/opt/airflow/jobs
      - ./data:/opt/airflow/data
      - ./sql:/opt/airflow/sql
      - airflow_logs:/opt/airflow/logs
    command: scheduler
    restart: unless-stopped

volumes:
  postgres_data:
  airflow_logs:
