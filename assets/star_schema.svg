<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace">

  <rect width="900" height="560" fill="#0d1117"/>

  <text x="450" y="30" text-anchor="middle" font-size="13" font-weight="600" fill="#7d8590" letter-spacing="3">DATA MODEL — STAR SCHEMA</text>

  <!-- ── fact_ratings (center) ── -->
  <rect x="320" y="180" width="210" height="140" rx="10" fill="#161b22" stroke="#1f6feb" stroke-width="2"/>
  <rect x="320" y="180" width="210" height="30" rx="10" fill="#1f6feb"/>
  <rect x="320" y="198" width="210" height="12" fill="#1f6feb"/>
  <text x="425" y="200" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">fact_ratings</text>
  <text x="425" y="226" text-anchor="middle" font-size="10" fill="#58a6ff">user_id  FK</text>
  <text x="425" y="244" text-anchor="middle" font-size="10" fill="#58a6ff">movie_id  FK</text>
  <text x="425" y="262" text-anchor="middle" font-size="10" fill="#8b949e">rating · rating_date</text>
  <text x="425" y="280" text-anchor="middle" font-size="10" fill="#8b949e">rating_year</text>
  <text x="425" y="302" text-anchor="middle" font-size="10" font-weight="600" fill="#3fb950">33,832,162 rows</text>

  <!-- ── dim_movies (left top) ── -->
  <rect x="40" y="120" width="210" height="130" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="40" y="120" width="210" height="30" rx="10" fill="#238636"/>
  <rect x="40" y="138" width="210" height="12" fill="#238636"/>
  <text x="145" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">dim_movies</text>
  <text x="145" y="166" text-anchor="middle" font-size="10" fill="#3fb950">movie_id  PK</text>
  <text x="145" y="184" text-anchor="middle" font-size="10" fill="#8b949e">title · clean_title</text>
  <text x="145" y="200" text-anchor="middle" font-size="10" fill="#8b949e">genres · release_year</text>
  <text x="145" y="220" text-anchor="middle" font-size="10" font-weight="600" fill="#3fb950">79,476 rows</text>

  <!-- FK dim_movies → fact_ratings -->
  <line x1="250" y1="195" x2="318" y2="230" stroke="#3fb950" stroke-width="1.5" marker-end="url(#s1)"/>
  <text x="283" y="206" text-anchor="middle" font-size="9" fill="#3fb950">FK</text>

  <!-- ── dim_users (left bottom) ── -->
  <rect x="40" y="300" width="210" height="100" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <rect x="40" y="300" width="210" height="30" rx="10" fill="#238636"/>
  <rect x="40" y="318" width="210" height="12" fill="#238636"/>
  <text x="145" y="320" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">dim_users</text>
  <text x="145" y="346" text-anchor="middle" font-size="10" fill="#3fb950">user_id  PK</text>
  <text x="145" y="366" text-anchor="middle" font-size="10" font-weight="600" fill="#3fb950">330,975 rows</text>

  <!-- FK dim_users → fact_ratings -->
  <line x1="250" y1="340" x2="318" y2="290" stroke="#3fb950" stroke-width="1.5" marker-end="url(#s1)"/>
  <text x="291" y="326" text-anchor="middle" font-size="9" fill="#3fb950">FK</text>

  <!-- ── genre_trends (right top) ── -->
  <rect x="650" y="80" width="210" height="120" rx="10" fill="#161b22" stroke="#e3b341" stroke-width="1.5"/>
  <rect x="650" y="80" width="210" height="30" rx="10" fill="#9e6a03"/>
  <rect x="650" y="98" width="210" height="12" fill="#9e6a03"/>
  <text x="755" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">genre_trends</text>
  <text x="755" y="126" text-anchor="middle" font-size="10" fill="#e3b341">genre · rating_year  PK</text>
  <text x="755" y="144" text-anchor="middle" font-size="10" fill="#8b949e">avg_rating · rating_count</text>
  <text x="755" y="162" text-anchor="middle" font-size="9" fill="#6e7681">aggregated by genre + year</text>
  <text x="755" y="180" text-anchor="middle" font-size="9" fill="#6e7681">derived · not FK linked</text>

  <line x1="650" y1="148" x2="532" y2="230" stroke="#e3b341" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#sam)"/>
  <text x="600" y="178" text-anchor="middle" font-size="9" fill="#e3b341">derived</text>

  <!-- ── decade_stats (right mid) ── -->
  <rect x="650" y="230" width="210" height="130" rx="10" fill="#161b22" stroke="#e3b341" stroke-width="1.5"/>
  <rect x="650" y="230" width="210" height="30" rx="10" fill="#9e6a03"/>
  <rect x="650" y="248" width="210" height="12" fill="#9e6a03"/>
  <text x="755" y="250" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">decade_stats</text>
  <text x="755" y="276" text-anchor="middle" font-size="10" fill="#e3b341">movie_id  PK</text>
  <text x="755" y="294" text-anchor="middle" font-size="10" fill="#8b949e">decade · avg_rating</text>
  <text x="755" y="312" text-anchor="middle" font-size="10" fill="#8b949e">total_ratings · clean_title</text>
  <text x="755" y="330" text-anchor="middle" font-size="9" fill="#6e7681">min 100 ratings filter</text>
  <text x="755" y="348" text-anchor="middle" font-size="9" fill="#6e7681">derived · not FK linked</text>

  <line x1="650" y1="295" x2="532" y2="265" stroke="#e3b341" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#sam)"/>

  <!-- ── tag_similarity (right bottom) ── -->
  <rect x="650" y="390" width="210" height="110" rx="10" fill="#161b22" stroke="#e3b341" stroke-width="1.5"/>
  <rect x="650" y="390" width="210" height="30" rx="10" fill="#9e6a03"/>
  <rect x="650" y="408" width="210" height="12" fill="#9e6a03"/>
  <text x="755" y="410" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">tag_similarity</text>
  <text x="755" y="436" text-anchor="middle" font-size="10" fill="#e3b341">movie_id_a · movie_id_b  PK</text>
  <text x="755" y="454" text-anchor="middle" font-size="10" fill="#8b949e">similarity  NUMERIC(6,4)</text>
  <text x="755" y="472" text-anchor="middle" font-size="9" fill="#6e7681">cosine sim · threshold > 0.85</text>
  <text x="755" y="490" text-anchor="middle" font-size="9" fill="#6e7681">top 500 movies by rating count</text>

  <line x1="650" y1="440" x2="532" y2="300" stroke="#e3b341" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#sam)"/>

  <!-- ── pipeline_run_log (bottom center) ── -->
  <rect x="200" y="430" width="240" height="110" rx="10" fill="#161b22" stroke="#8b949e" stroke-width="1.5"/>
  <rect x="200" y="430" width="240" height="30" rx="10" fill="#21262d"/>
  <rect x="200" y="448" width="240" height="12" fill="#21262d"/>
  <text x="320" y="450" text-anchor="middle" font-size="12" font-weight="700" fill="#c9d1d9">pipeline_run_log</text>
  <text x="320" y="476" text-anchor="middle" font-size="10" fill="#8b949e">run_id PK · run_date · status</text>
  <text x="320" y="494" text-anchor="middle" font-size="10" fill="#8b949e">dataset_hash · rows_loaded</text>
  <text x="320" y="512" text-anchor="middle" font-size="10" fill="#8b949e">duration_secs · pipeline_version</text>
  <text x="320" y="530" text-anchor="middle" font-size="10" font-weight="600" fill="#f78166">append-only audit trail</text>

  <!-- Legend -->
  <rect x="40" y="460" width="12" height="12" rx="2" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="58" y="471" font-size="9" fill="#8b949e">Dimension (FK to fact)</text>

  <rect x="40" y="480" width="12" height="12" rx="2" fill="#161b22" stroke="#e3b341" stroke-width="1.5"/>
  <text x="58" y="491" font-size="9" fill="#8b949e">Analytics (derived)</text>

  <rect x="40" y="500" width="12" height="12" rx="2" fill="#161b22" stroke="#1f6feb" stroke-width="2"/>
  <text x="58" y="511" font-size="9" fill="#8b949e">Fact table (center)</text>

  <rect x="40" y="520" width="12" height="12" rx="2" fill="#161b22" stroke="#8b949e" stroke-width="1"/>
  <text x="58" y="531" font-size="9" fill="#8b949e">Audit / pipeline tables</text>

  <defs>
    <marker id="s1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3fb950" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="sam" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#e3b341" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
</svg>
